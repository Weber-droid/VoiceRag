<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoiceRAG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
         :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --border: #1e1e2e;
            --accent: #7c6aff;
            --accent2: #ff6a9b;
            --text: #e8e8f0;
            --muted: #5a5a72;
            --success: #4ade80;
            --error: #f87171;
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }
        /* Ambient background */
        
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(124, 106, 255, 0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        
        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(255, 106, 155, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            width: 100%;
            max-width: 1100px;
            position: relative;
            z-index: 1;
        }
        
        header {
            text-align: center;
            margin-bottom: 48px;
        }
        
        .logo {
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            color: var(--accent);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        
        h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, var(--text) 30%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            margin-top: 12px;
            color: var(--muted);
            font-size: 0.95rem;
            font-weight: 400;
        }
        /* Cards */
        
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }
        
        .card:hover {
            border-color: #2e2e44;
        }
        
        .card-label {
            font-size: 10px;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 14px;
        }
        /* Upload zone */
        
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 36px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .upload-zone:hover,
        .upload-zone.dragover {
            border-color: var(--accent);
            background: rgba(124, 106, 255, 0.05);
        }
        
        .upload-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }
        
        .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .upload-zone p {
            color: var(--muted);
            font-size: 0.9rem;
        }
        
        .upload-zone span {
            color: var(--accent);
            font-weight: 600;
        }
        
        .file-list {
            margin-top: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .file-chip {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(124, 106, 255, 0.1);
            border: 1px solid rgba(124, 106, 255, 0.2);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 0.85rem;
            font-family: 'DM Mono', monospace;
            min-width: 0;
        }
        
        .file-chip .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
        }
        
        .file-chip span:not(.chunks) {
            overflow-wrap: break-word;
            word-break: break-word;
            flex: 1;
            min-width: 0;
        }
        
        .file-chip .chunks {
            margin-left: auto;
            color: var(--muted);
            font-size: 0.75rem;
            flex-shrink: 0;
            white-space: nowrap;
        }
        /* Voice button */
        
        .voice-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .mic-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            transition: all 0.2s;
            position: relative;
            outline: none;
        }
        
        .mic-btn:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(124, 106, 255, 0.2);
        }
        
        .mic-btn.recording {
            border-color: var(--accent2);
            box-shadow: 0 0 0 0 rgba(255, 106, 155, 0.4);
            animation: pulse 1.2s ease-out infinite;
        }
        
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 106, 155, 0.4);
            }
            70% {
                box-shadow: 0 0 0 20px rgba(255, 106, 155, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 106, 155, 0);
            }
        }
        
        .mic-status {
            font-size: 0.85rem;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            text-align: center;
        }
        
        .mic-status.active {
            color: var(--accent2);
        }
        /* Transcript / answer */
        
        .exchange {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .bubble {
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.6;
            max-width: 90%;
        }
        
        .bubble.question {
            background: rgba(124, 106, 255, 0.12);
            border: 1px solid rgba(124, 106, 255, 0.2);
            align-self: flex-end;
            color: var(--text);
        }
        
        .bubble.answer {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            align-self: flex-start;
        }
        
        .bubble .label {
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        
        .bubble.question .label {
            color: var(--accent);
        }
        
        .bubble.answer .label {
            color: var(--success);
        }
        
        .source-pills {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .source-pill {
            font-size: 0.7rem;
            font-family: 'DM Mono', monospace;
            padding: 3px 10px;
            background: rgba(74, 222, 128, 0.08);
            border: 1px solid rgba(74, 222, 128, 0.15);
            border-radius: 20px;
            color: var(--success);
        }
        /* Loading */
        
        .loading {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-size: 0.85rem;
            font-family: 'DM Mono', monospace;
        }
        
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        /* Toast */
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 20px;
            font-size: 0.85rem;
            font-family: 'DM Mono', monospace;
            transition: transform 0.3s ease;
            z-index: 100;
            white-space: nowrap;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .toast.success {
            border-color: rgba(74, 222, 128, 0.3);
            color: var(--success);
        }
        
        .toast.error {
            border-color: rgba(248, 113, 113, 0.3);
            color: var(--error);
        }
        /* Audio player */
        
        .audio-player {
            width: 100%;
            margin-top: 8px;
            accent-color: var(--accent);
        }
        
        .layout {
            display: flex;
            gap: 20px;
            align-items: stretch;
        }
        
        .answer-card {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .answer-card #answerArea {
            flex: 1;
        }
        
        .sidebar {
            width: 300px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar .card {
            flex: 1;
        }
        /* Responsive Design */
        
        @media (max-width: 1024px) {
            .container {
                max-width: 95%;
            }
            .sidebar {
                width: 280px;
            }
            .card {
                padding: 24px;
            }
        }
        
        @media (max-width: 768px) {
            body {
                padding: 30px 16px;
            }
            .container {
                max-width: 100%;
            }
            header {
                margin-bottom: 36px;
            }
            .logo {
                font-size: 10px;
                margin-bottom: 12px;
            }
            h1 {
                font-size: clamp(2rem, 5vw, 3.5rem);
            }
            .subtitle {
                font-size: 0.9rem;
            }
            .layout {
                flex-direction: column;
                gap: 16px;
            }
            .sidebar {
                width: 100%;
            }
            .card {
                padding: 20px;
                margin-bottom: 16px;
                border-radius: 12px;
            }
            .card-label {
                font-size: 9px;
                margin-bottom: 12px;
            }
            body::before {
                width: 80vw;
                height: 80vw;
                top: -40%;
                left: -20%;
            }
            body::after {
                width: 70vw;
                height: 70vw;
                bottom: -30%;
                right: -20%;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 20px 12px;
            }
            header {
                margin-bottom: 28px;
            }
            h1 {
                font-size: clamp(1.75rem, 5vw, 3rem);
            }
            .logo {
                font-size: 9px;
                margin-bottom: 8px;
            }
            .subtitle {
                font-size: 0.85rem;
                margin-top: 8px;
            }
            .badge {
                font-size: 0.65rem;
                padding: 2px 8px;
                margin-left: 4px;
            }
            .layout {
                gap: 12px;
            }
            .card {
                padding: 16px;
                margin-bottom: 12px;
                border-radius: 10px;
            }
            .card-label {
                font-size: 8px;
                margin-bottom: 10px;
            }
            .upload-zone {
                padding: 24px 16px;
                border-radius: 10px;
            }
            .upload-icon {
                font-size: 2rem;
                margin-bottom: 8px;
            }
            .upload-zone p {
                font-size: 0.85rem;
            }
            .upload-zone p:last-child {
                font-size: 0.7rem;
                margin-top: 4px;
            }
            .file-chip {
                padding: 6px 10px;
                font-size: 0.8rem;
                gap: 8px;
            }
            .file-chip span:not(.chunks) {
                font-size: 0.8rem;
            }
            .file-chip .chunks {
                font-size: 0.65rem;
            }
            .mic-btn {
                width: 80px;
                height: 80px;
                font-size: 2rem;
                border-width: 1.5px;
            }
            .mic-status {
                font-size: 0.8rem;
            }
            .bubble {
                padding: 12px 14px;
                font-size: 0.85rem;
                max-width: 100%;
                border-radius: 10px;
            }
            .bubble .label {
                font-size: 0.65rem;
                margin-bottom: 4px;
            }
            .source-pill {
                font-size: 0.65rem;
                padding: 2px 8px;
            }
            .loading {
                font-size: 0.8rem;
                gap: 8px;
            }
            .spinner {
                width: 14px;
                height: 14px;
                border-width: 1.5px;
            }
            .toast {
                padding: 10px 16px;
                font-size: 0.8rem;
                bottom: 20px;
                border-radius: 8px;
                max-width: 90%;
                word-wrap: break-word;
                white-space: normal;
            }
            .progress-label {
                font-size: 0.7rem;
            }
            .progress-bar {
                height: 5px;
            }
            .empty-state {
                font-size: 0.8rem;
                padding: 16px;
            }
            body::before {
                width: 100vw;
                height: 100vw;
            }
            body::after {
                width: 100vw;
                height: 100vw;
            }
        }
        
        @media (max-width: 360px) {
            body {
                padding: 16px 10px;
            }
            h1 {
                font-size: clamp(1.5rem, 5vw, 2.5rem);
            }
            .logo {
                font-size: 8px;
                letter-spacing: 0.2em;
            }
            .subtitle {
                font-size: 0.8rem;
            }
            .mic-btn {
                width: 70px;
                height: 70px;
                font-size: 1.75rem;
            }
            .card {
                padding: 12px;
            }
            .bubble {
                padding: 10px 12px;
                font-size: 0.8rem;
            }
        }
        
        .empty-state {
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
            padding: 20px;
            font-family: 'DM Mono', monospace;
        }
        
        .badge {
            display: inline-block;
            font-size: 0.7rem;
            font-family: 'DM Mono', monospace;
            padding: 3px 10px;
            border-radius: 20px;
            margin-left: 8px;
        }
        
        .badge.week {
            background: rgba(124, 106, 255, 0.15);
            color: var(--accent);
        }
        /* Progress bar */
        
        .progress-container {
            display: none;
            margin-top: 14px;
            flex-direction: column;
            gap: 8px;
        }
        
        .progress-container.show {
            display: flex;
        }
        
        .progress-label {
            font-size: 0.75rem;
            font-family: 'DM Mono', monospace;
            color: var(--accent);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(124, 106, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid rgba(124, 106, 255, 0.2);
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 3px;
            animation: progress-pulse 1.5s ease-in-out infinite;
            width: 30%;
        }
        
        @keyframes progress-pulse {
            0% {
                width: 30%;
            }
            50% {
                width: 70%;
            }
            100% {
                width: 30%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>VoiceRAG</h1>
            <p class="subtitle">Upload a PDF. Ask questions with your voice. Hear the answers.</p>
        </header>

        <div class="layout">
            <!-- Left: Upload + Ask -->
            <div class="sidebar">
                <div class="card">
                    <div class="card-label">01 — Upload Document</div>
                    <div class="upload-zone" id="uploadZone">
                        <input type="file" id="fileInput" accept=".pdf" />
                        <div class="upload-icon">📄</div>
                        <p><span>Click to upload</span> or drag a PDF here</p>
                        <p style="margin-top:8px;font-size:0.78rem;color:var(--muted)">Max file size: 10 MB</p>
                    </div>
                    <div class="progress-container" id="progressContainer">
                        <div class="progress-label">Chunking in progress…</div>
                        <div class="progress-bar">
                            <div class="progress-fill"></div>
                        </div>
                    </div>
                    <div class="file-list" id="fileList"></div>
                </div>

                <div class="card">
                    <div class="card-label">02 — Ask a Question</div>
                    <div class="voice-area">
                        <button class="mic-btn" id="micBtn" title="Hold to record">🎙️</button>
                        <div class="mic-status" id="micStatus">Click and hold to record</div>
                    </div>
                </div>
            </div>

            <!-- Right: Answer -->
            <div class="card answer-card">
                <div class="card-label">03 — Answer</div>
                <div id="answerArea">
                    <div class="empty-state">Your Q&A will appear here...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = ''; // same origin
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;

        // ── Upload ──────────────────────────────────────────────────────────────
        const fileInput = document.getElementById('fileInput');
        const uploadZone = document.getElementById('uploadZone');
        const fileList = document.getElementById('fileList');

        uploadZone.addEventListener('dragover', e => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
        uploadZone.addEventListener('drop', e => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) handleUpload(file);
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files[0]) handleUpload(fileInput.files[0]);
        });

        async function handleUpload(file) {
            if (!file.name.endsWith('.pdf')) {
                showToast('Only PDF files are supported', 'error');
                return;
            }
            showToast('Uploading & ingesting…', 'success');

            const progressContainer = document.getElementById('progressContainer');
            progressContainer.classList.add('show');

            const form = new FormData();
            form.append('file', file);

            try {
                const res = await fetch(`${API}/upload`, { method: 'POST', body: form });
                const data = await res.json();
                if (!res.ok) throw { status: res.status, detail: data.detail };

                const chip = document.createElement('div');
                chip.className = 'file-chip';
                chip.innerHTML = `<div class="dot"></div><span>${file.name}</span><span class="chunks">${data.chunks} chunks</span>`;
                fileList.appendChild(chip);
                showToast(`"${file.name}" ready`, 'success');
            } catch (err) {
                const msg = uploadErrorMessage(err);
                showToast(msg, 'error');
            } finally {
                progressContainer.classList.remove('show');
            }
        }

        function uploadErrorMessage(err) {
            if (!navigator.onLine) return 'No internet connection.';
            if (err.status === 413) return 'File too large. Maximum size is 10 MB.';
            if (err.status === 429) return 'Upload limit reached. Try again in an hour.';
            if (err.status === 400) return err.detail || 'Invalid file.';
            if (err.status >= 500) return 'Server error while processing the PDF. Try again.';
            if (err.detail) return err.detail;
            return 'Upload failed. Check your connection and try again.';
        }

        // ── Recording ──────────────────────────────────────────────────────────
        const micBtn = document.getElementById('micBtn');
        const micStatus = document.getElementById('micStatus');

        micBtn.addEventListener('mousedown', startRecording);
        micBtn.addEventListener('touchstart', e => {
            e.preventDefault();
            startRecording();
        });
        micBtn.addEventListener('mouseup', stopRecording);
        micBtn.addEventListener('mouseleave', () => {
            if (isRecording) stopRecording();
        });
        micBtn.addEventListener('touchend', stopRecording);

        async function startRecording() {
            if (isRecording) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = sendAudio;
                mediaRecorder.start();
                isRecording = true;
                micBtn.classList.add('recording');
                micBtn.textContent = '⏹️';
                micStatus.textContent = 'Recording… release to send';
                micStatus.classList.add('active');
            } catch (err) {
                const msg = err.name === 'NotAllowedError'
                    ? 'Microphone access denied. Allow it in your browser settings.'
                    : 'Could not access microphone.';
                showToast(msg, 'error');
                renderError(msg);
            }
        }

        function stopRecording() {
            if (!isRecording || !mediaRecorder) return;
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(t => t.stop());
            isRecording = false;
            micBtn.classList.remove('recording');
            micBtn.textContent = '🎙️';
            micStatus.textContent = 'Processing…';
            micStatus.classList.remove('active');
        }

        async function sendAudio() {
            const blob = new Blob(audioChunks, {
                type: 'audio/webm'
            });
            const form = new FormData();
            form.append('audio', blob, 'recording.webm');

            setAnswerLoading();

            try {
                const res = await fetch(`${API}/ask/voice`, { method: 'POST', body: form });
                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    throw { status: res.status, detail: data.detail };
                }

                const question = decodeURIComponent(res.headers.get('X-Question') || '');
                const answerText = decodeURIComponent(res.headers.get('X-Answer') || '');
                const sources = decodeURIComponent(res.headers.get('X-Sources') || '').split(',').filter(Boolean);

                const audioBlob = await res.blob();
                const audioUrl = URL.createObjectURL(audioBlob);

                renderAnswer(question, answerText, sources, audioUrl);
                micStatus.textContent = 'Click and hold to record';
            } catch (err) {
                const msg = voiceErrorMessage(err);
                showToast(msg, 'error');
                micStatus.textContent = 'Click and hold to record';
                renderError(msg);
            }
        }

        function voiceErrorMessage(err) {
            if (!navigator.onLine) return 'No internet connection.';
            if (err.status === 400) return err.detail || 'Could not understand the audio. Try speaking more clearly.';
            if (err.status === 413) return 'Recording too long. Keep it under 5 MB.';
            if (err.status === 429) return 'Question limit reached. Try again in an hour.';
            if (err.status >= 500) return 'Server error. Try again in a moment.';
            if (err.detail) return err.detail;
            return 'Something went wrong. Check your connection and try again.';
        }

        // ── Render ─────────────────────────────────────────────────────────────
        function setAnswerLoading() {
            document.getElementById('answerArea').innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <span>Transcribing → retrieving → generating → speaking…</span>
        </div>`;
        }

        function renderAnswer(question, answer, sources, audioUrl) {
            const sourcePills = sources.map(s => `<span class="source-pill">📄 ${s.trim()}</span>`).join('');
            document.getElementById('answerArea').innerHTML = `
        <div class="exchange">
          <div class="bubble question">
            <div class="label">You asked</div>
            ${question}
          </div>
          <div class="bubble answer">
            <div class="label">VoiceRAG</div>
            ${answer}
            ${sourcePills ? `<div class="source-pills">${sourcePills}</div>` : ''}
            <audio class="audio-player" controls autoplay src="${audioUrl}"></audio>
          </div>
        </div>`;
    }

        function renderError(msg) {
            document.getElementById('answerArea').innerHTML = `
          <div class="bubble answer" style="border-color:rgba(248,113,113,0.3)">
            <div class="label" style="color:var(--error)">Error</div>
            ${msg}
          </div>`;
        }

    // ── Toast ──────────────────────────────────────────────────────────────
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }
    </script>
</body>

</html>
